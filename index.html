<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Grand Strategy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1a;
      overflow: hidden;
      font-family: 'Georgia', serif;
      color: #e8d9b0;
    }

    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
    }

    #info-panel {
      position: absolute;
      top: 12px; right: 12px;
      width: 220px;
      background: rgba(10, 15, 26, 0.88);
      border: 1px solid #4a6a9a;
      border-radius: 4px;
      padding: 12px;
      pointer-events: none;
      min-height: 100px;
    }

    #info-panel h2 {
      font-size: 14px;
      color: #e8c53a;
      border-bottom: 1px solid #2a3a5a;
      padding-bottom: 6px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
    }

    #info-panel .field {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
      color: #c8c0a0;
    }

    #info-panel .field span:last-child {
      color: #e8d9b0;
      text-align: right;
      max-width: 130px;
    }

    #info-panel .country-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    #info-panel.empty h2 {
      color: #6a7a9a;
    }

    #info-panel .panel-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6a7a9a;
      margin-bottom: 4px;
    }

    /* Building chips in the info panel */
    #info-panel .field--buildings { align-items: flex-start; }
    #info-panel .building-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: flex-end;
    }
    #info-panel .building-none {
      color: #6a7a9a;
      font-style: italic;
      font-size: 11px;
    }
    #info-panel .building-chip {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
      font-family: sans-serif;
      letter-spacing: 0.3px;
      font-weight: 600;
      border: 1px solid transparent;
    }
    #info-panel .building-chip--farm     { background: rgba(60,180,80,0.2);   border-color: rgba(60,180,80,0.6);   color: #7ed99a; }
    #info-panel .building-chip--barracks { background: rgba(200,50,50,0.2);   border-color: rgba(200,50,50,0.6);   color: #e07a7a; }
    #info-panel .building-chip--port     { background: rgba(50,120,200,0.2);  border-color: rgba(50,120,200,0.6);  color: #7aaee8; }
    #info-panel .building-chip--walls    { background: rgba(130,130,140,0.2); border-color: rgba(130,130,140,0.6); color: #b0b0be; }

    #legend {
      position: absolute;
      bottom: 12px; left: 12px;
      background: rgba(10, 15, 26, 0.88);
      border: 1px solid #4a6a9a;
      border-radius: 4px;
      padding: 10px 12px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      pointer-events: all;
    }

    #legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    #legend h3 {
      font-size: 11px;
      color: #e8c53a;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    #legend-toggle {
      font-size: 10px;
      color: #e8c53a;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    #legend.collapsed #legend-toggle {
      transform: rotate(-90deg);
    }

    #legend.collapsed #legend-header:hover {
      background: rgba(74, 106, 154, 0.25);
      border-radius: 3px;
      margin: -3px -4px;
      padding: 3px 4px;
    }

    #legend-body {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      max-height: 600px;
      opacity: 1;
      margin-top: 8px;
      border-top: 1px solid #2a3a5a;
      padding-top: 6px;
    }

    #legend.collapsed #legend-body {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      border-top: none;
      padding-top: 0;
    }

    #combat-log {
      position: absolute;
      bottom: max(12px, calc(env(safe-area-inset-bottom, 0px) + 12px)); right: 12px;
      background: rgba(10, 15, 26, 0.88);
      border: 1px solid #4a6a9a;
      border-radius: 4px;
      padding: 10px 12px;
      width: 260px;
      pointer-events: all;
    }

    #combat-log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    #combat-log h3 {
      font-size: 11px;
      color: #e8c53a;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    #combat-log-toggle {
      font-size: 10px;
      color: #e8c53a;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    #combat-log.collapsed #combat-log-toggle {
      transform: rotate(-90deg);
    }

    #combat-log.collapsed #combat-log-header:hover {
      background: rgba(74, 106, 154, 0.25);
      border-radius: 3px;
      margin: -3px -4px;
      padding: 3px 4px;
    }

    #combat-log-body {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      max-height: 260px;
      opacity: 1;
      margin-top: 8px;
      border-top: 1px solid #2a3a5a;
      padding-top: 6px;
    }

    #combat-log.collapsed #combat-log-body {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      border-top: none;
      padding-top: 0;
    }

    #combat-log-list {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .log-entry {
      font-size: 10px;
      line-height: 1.4;
      padding: 4px 6px;
      border-radius: 3px;
      border-left: 2px solid transparent;
    }

    .log-entry.conquered {
      color: #d4a84b;
      border-left-color: #c0392b;
      background: rgba(192, 57, 43, 0.1);
    }

    .log-entry.repelled {
      color: #8ab4c8;
      border-left-color: #2980b9;
      background: rgba(41, 128, 185, 0.1);
    }

    .log-entry.diplomacy-war {
      color: #e07b54;
      border-left-color: #c0392b;
      background: rgba(192, 57, 43, 0.08);
    }

    .log-entry.diplomacy-peace {
      color: #7ec8a0;
      border-left-color: #27ae60;
      background: rgba(39, 174, 96, 0.08);
    }

    .log-entry.diplomacy-alliance {
      color: #c39bd3;
      border-left-color: #8e44ad;
      background: rgba(142, 68, 173, 0.08);
    }

    .log-entry.diplomacy-ally {
      color: #f0c060;
      border-left-color: #e67e22;
      background: rgba(230, 126, 34, 0.08);
    }

    .log-entry .log-turn {
      color: #6a7a9a;
      font-size: 9px;
      display: block;
      margin-bottom: 1px;
    }

    #combat-log-empty {
      font-size: 10px;
      color: #6a7a9a;
      font-style: italic;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      font-size: 11px;
      color: #c8c0a0;
      gap: 7px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #title-bar {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e8c53a;
      text-shadow: 0 0 20px rgba(232,197,58,0.4);
      pointer-events: none;
    }

    #leaderboard {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(10, 15, 26, 0.88);
      border: 1px solid #4a6a9a;
      border-radius: 4px;
      padding: 10px 12px;
      width: 260px;
      max-height: calc(100vh - 40px);
      pointer-events: all;
    }

    #leaderboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    #leaderboard h3 {
      font-size: 11px;
      color: #e8c53a;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    #leaderboard-toggle {
      font-size: 10px;
      color: #e8c53a;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    #leaderboard.collapsed #leaderboard-toggle {
      transform: rotate(-90deg);
    }

    #leaderboard.collapsed #leaderboard-header:hover {
      background: rgba(74, 106, 154, 0.25);
      border-radius: 3px;
      margin: -3px -4px;
      padding: 3px 4px;
    }

    #leaderboard-body {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      max-height: 600px;
      opacity: 1;
      margin-top: 8px;
      border-top: 1px solid #2a3a5a;
      padding-top: 6px;
    }

    #leaderboard.collapsed #leaderboard-body {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      border-top: none;
      padding-top: 0;
    }

    #leaderboard-list {
      max-height: 360px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Column header row — same grid as lb-row */
    .lb-header-row {
      display: grid;
      grid-template-columns: 20px 12px 1fr auto;
      gap: 4px;
      align-items: center;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #6a7a9a;
      padding: 0 2px 4px;
      border-bottom: 1px solid #2a3a5a;
      margin-bottom: 2px;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 20px 12px 1fr auto;
      gap: 4px;
      align-items: center;
      font-size: 11px;
      padding: 3px 2px;
      border-radius: 3px;
      transition: background 0.1s;
    }

    .lb-row:hover {
      background: rgba(74, 106, 154, 0.15);
    }

    .lb-row--eliminated {
      opacity: 0.4;
    }

    .lb-rank {
      font-size: 10px;
      color: #6a7a9a;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .lb-swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .lb-name {
      color: #c8c0a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 10px;
    }

    .lb-stats {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }

    .lb-stat {
      font-size: 10px;
      color: #e8d9b0;
      text-align: right;
      font-variant-numeric: tabular-nums;
      min-width: 24px;
    }

    .lb-stat--str {
      color: #e07a7a;
      min-width: 30px;
    }

    .lb-stat--gold {
      color: #e8c53a;
      min-width: 36px;
    }

  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-overlay">
    <div id="title-bar">Grand Strategy</div>
    <div id="leaderboard">
      <div id="leaderboard-header" title="Click to expand/collapse">
        <h3>Leaderboard</h3>
        <span id="leaderboard-toggle">▼</span>
      </div>
      <div id="leaderboard-body">
        <div class="lb-header-row">
          <span></span>
          <span></span>
          <span>Nation</span>
          <span class="lb-stats">
            <span class="lb-stat" title="Provinces">Prov</span>
            <span class="lb-stat lb-stat--str" title="Military Strength">Str</span>
            <span class="lb-stat lb-stat--gold" title="Gold">Gold</span>
          </span>
        </div>
        <div id="leaderboard-list"></div>
      </div>
    </div>
    <div id="info-panel" class="empty">
      <h2>Select a Province</h2>
      <p style="font-size:11px;color:#6a7a9a;">Click any province to view details.</p>
    </div>
    <div id="legend">
      <div id="legend-header" title="Click to expand/collapse">
        <h3>Nations</h3>
        <span id="legend-toggle">▼</span>
      </div>
      <div id="legend-body">
        <div id="legend-list"></div>
      </div>
    </div>
    <div id="combat-log">
      <div id="combat-log-header" title="Click to expand/collapse">
        <h3>War Log</h3>
        <span id="combat-log-toggle">▼</span>
      </div>
      <div id="combat-log-body">
        <div id="combat-log-list">
          <span id="combat-log-empty">No events yet.</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    document.getElementById('leaderboard-header').addEventListener('click', function() {
      document.getElementById('leaderboard').classList.toggle('collapsed');
    });
    document.getElementById('legend-header').addEventListener('click', function() {
      document.getElementById('legend').classList.toggle('collapsed');
    });
    document.getElementById('combat-log-header').addEventListener('click', function() {
      document.getElementById('combat-log').classList.toggle('collapsed');
    });
  </script>
</body>
</html>
